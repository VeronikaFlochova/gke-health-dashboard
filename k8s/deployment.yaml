apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-dashboard
  namespace: default
  labels:
    app: health-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: health-dashboard
  template:
    metadata:
      labels:
        app: health-dashboard
    spec:
      serviceAccountName: dashboard-sa
      containers:
        - name: health-dashboard
          image: europe-west2-docker.pkg.dev/project-e2b12bf9-db94-473a-943/cloudeng-repo/health-dashboard:v1
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            