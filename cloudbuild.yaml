steps:
  # Step 1 - Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west2-docker.pkg.dev/$PROJECT_ID/cloudeng-repo/health-dashboard:$COMMIT_SHA'
      - './app'

  # Step 2 - Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west2-docker.pkg.dev/$PROJECT_ID/cloudeng-repo/health-dashboard:$COMMIT_SHA'

  # Step 3 - Fill the placeholders in the manifest
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        sed -i -e "s|__PROJECT_ID__|$PROJECT_ID|g" \
               -e "s|__IMAGE_TAG__|$COMMIT_SHA|g" \
               k8s/deployment.yaml
        grep image: k8s/deployment.yaml

  # Step 4 - Apply everything and wait for the rollout
  - name: 'gcr.io/cloud-builders/kubectl'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud container clusters get-credentials cloudeng-cluster \
          --zone europe-west2-a --project $PROJECT_ID
        kubectl apply -f k8s/
        kubectl rollout status deployment/health-dashboard --timeout=180s
