steps:
  # Step 1 - Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west2-docker.pkg.dev/$PROJECT_ID/cloudeng-repo/health-dashboard:$COMMIT_SHA'
      - '-t'
      - 'europe-west2-docker.pkg.dev/$PROJECT_ID/cloudeng-repo/health-dashboard:latest'
      - './app'

  # Step 2 - Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west2-docker.pkg.dev/$PROJECT_ID/cloudeng-repo/health-dashboard:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west2-docker.pkg.dev/$PROJECT_ID/cloudeng-repo/health-dashboard:latest'

  # Step 3 - Deploy to GKE
  - name: 'gcr.io/cloud-builders/kubectl'
    args:
      - 'set'
      - 'image'
      - 'deployment/health-dashboard'
      - 'health-dashboard=europe-west2-docker.pkg.dev/$PROJECT_ID/cloudeng-repo/health-dashboard:$COMMIT_SHA'
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=europe-west2-a'
      - 'CLOUDSDK_CONTAINER_CLUSTER=cloudeng-cluster'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'europe-west2-docker.pkg.dev/$PROJECT_ID/cloudeng-repo/health-dashboard:$COMMIT_SHA'
  - 'europe-west2-docker.pkg.dev/$PROJECT_ID/cloudeng-repo/health-dashboard:latest'